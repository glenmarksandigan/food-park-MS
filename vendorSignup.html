<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="h-screen flex">
  <!-- Left section with image -->
  <div class="w-1/2 hidden md:flex items-center justify-center bg-gray-800">
    <img src="https://lh3.googleusercontent.com/p/AF1QipM1LFmBmTAyqtnVsAxFvxvP789ask9GyGewi3wI=s680-w680-h510" alt="Vendor Signup" class="h-full object-cover">
  </div>

  <!-- Right section for signup form -->
  <div class="w-full md:w-1/2 flex items-center justify-center p-10 bg-white">
    <div class="w-full max-w-md bg-white p-8 rounded-lg shadow-lg">
      <h2 class="text-4xl font-extrabold text-gray-800 mb-6 text-center">Join as a Vendor</h2>
      <form class="space-y-5" action="vendorSignup.php" method="POST">
        <div>
          <label class="block text-sm font-medium text-gray-700">Vendor Name</label>
          <input type="text" name="name" class="mt-1 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Tasty Bites" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Email</label>
          <input type="email" name="email" class="mt-1 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="vendor@example.com" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Contact Number</label>
          <input type="tel" name="contact_info" class="mt-1 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="+1234567890" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Address</label>
          <input type="text" name="address" class="mt-1 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="123 Main Street" required />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" name="password" class="mt-1 w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="••••••••" required />
        </div>
        <button type="submit" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition duration-200">Sign Up</button>
      </form>
      <p class="mt-6 text-sm text-center text-gray-600">
        Already have an account?
        <a href="vendorLogin.html" class="text-green-600 hover:underline font-medium">Login</a>
      </p>
    </div>
  </div>
</body>
</html>
