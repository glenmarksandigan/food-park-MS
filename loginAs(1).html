<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
        }
        .left-section {
            background-image: url(https://lh3.googleusercontent.com/p/AF1QipM1LFmBmTAyqtnVsAxFvxvP789ask9GyGewi3wI=s680-w680-h510);
            background-size: cover;
            flex: 1;
        }
        .right-section {
            background-color: green; /* Change the color as needed */
            color: white;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .login-title {
            font-size: 4em;
            margin: 20px;
            height: 20%;
            font-family: Georgia, 'Times New Roman', Times, serif;
        }
        .name-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .login-button {
            background-color: orange; 
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.5em;
            margin: 1px 0; /* Increased vertical space */
            cursor: pointer;
            transition: background-color 0.3s;
            border-radius: 40px;
        }
        .login-button1 {
            background-color: orange; 
            color: white;
            border: none;
            padding: 15px 47px;
            font-size: 1.5em;
            margin: 100px ; /* Increased vertical space */
            cursor: pointer;
            transition: background-color 0.3s;
            border-radius: 40px;
            margin-top: 50px;
        }
        .login-button:hover {
            background-color:orangered; 
        }
        .login-button1:hover {
            background-color:orangered; 
        }
    </style>
</head>
<body>
    <div class="left-section"></div>
    <div class="right-section">
        <div class="login-title">Log in As</div>
        <div class="name-container">
            <button class="login-button">CUSTOMER</button>
            <button class="login-button1">VENDOR</button>
        </div>
    </div>
</body>
</html>
